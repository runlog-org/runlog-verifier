name: release

on:
  push:
    tags: ["v*", "verifier/v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (smoke run; no Release will be created)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required for softprops/action-gh-release
    outputs:
      version: ${{ steps.meta.outputs.version }}
      draft: ${{ steps.meta.outputs.draft }}
    steps:
      - uses: actions/checkout@v6

      # runlog-schema is a regular Go module dependency pinned in
      # go.mod ([F28]); proxy.golang.org serves it. No sibling checkout.
      #
      # Pin an EXACT patch version, not the "1.26" minor constraint.
      # actions/setup-go resolves a bare minor to the latest available
      # 1.26.x patch *at run time*, so the same source built weeks apart
      # picks up a newer toolchain and yields a different binary. That
      # cross-run drift broke `brew install` on 2026-05-16 [T99]. The
      # exact pin is what makes cross-run reproduction real (see
      # RELEASING.md). Bumping it is a deliberate, release-noted change.
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache: true

      - name: Resolve version + commit
        id: meta
        run: |
          ref="${GITHUB_REF##*/}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            ref="${{ inputs.tag }}"
          fi
          commit=$(git rev-parse --short HEAD)
          echo "version=${ref}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${ref#v}" >> "$GITHUB_OUTPUT"
          echo "commit=${commit}" >> "$GITHUB_OUTPUT"
          # Pre-release tags (vX-rcN, vX-betaN) ship as drafts.
          case "$ref" in
            *-rc*|*-beta*|*-alpha*) echo "draft=true"  >> "$GITHUB_OUTPUT" ;;
            *)                      echo "draft=false" >> "$GITHUB_OUTPUT" ;;
          esac

      # Cross-compile the four target binaries with the same reproducibility
      # flags as the Makefile (-trimpath -buildvcs=false, ldflags pinning
      # Version + Commit, -s -w). Build each binary twice in separate output
      # dirs and fail fast if any pair diverges — same trust model as the
      # single-target check in verifier.yml, extended to all four targets.
      # See runlog-docs/03-verification-and-provenance.md §5.4.
      - name: Build + reproducibility check (all targets)
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT:  ${{ steps.meta.outputs.commit }}
        run: |
          set -euo pipefail
          mkdir -p dist/a dist/b dist/release
          targets=(linux/amd64 linux/arm64 darwin/amd64 darwin/arm64)
          ldflags="-X main.Version=${VERSION} -X main.Commit=${COMMIT} -s -w"
          for t in "${targets[@]}"; do
            goos="${t%/*}"; goarch="${t#*/}"
            name="runlog-verifier-${goos}-${goarch}"
            for out in dist/a dist/b; do
              GOOS="$goos" GOARCH="$goarch" \
                go build -trimpath -buildvcs=false \
                  -ldflags "$ldflags" \
                  -o "$out/$name" \
                  ./cmd/runlog-verifier
            done
            sha_a=$(sha256sum "dist/a/$name" | awk '{print $1}')
            sha_b=$(sha256sum "dist/b/$name" | awk '{print $1}')
            if [ "$sha_a" != "$sha_b" ]; then
              echo "::error::Reproducibility check FAILED for $name:"
              echo "  build 1: $sha_a"
              echo "  build 2: $sha_b"
              exit 1
            fi
            echo "Reproducible $name: $sha_a"
            cp "dist/a/$name" "dist/release/$name"
          done

      - name: Build runlog-verifier_${{ steps.meta.outputs.version_no_v }}_amd64.deb
        uses: goreleaser/nfpm-action@v1
        with:
          packager: deb
          config: nfpm.yaml
          target: dist/release/
        env:
          ARCH: amd64
          VERSION: ${{ steps.meta.outputs.version_no_v }}

      - name: Build runlog-verifier_${{ steps.meta.outputs.version_no_v }}_arm64.deb
        uses: goreleaser/nfpm-action@v1
        with:
          packager: deb
          config: nfpm.yaml
          target: dist/release/
        env:
          ARCH: arm64
          VERSION: ${{ steps.meta.outputs.version_no_v }}

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd dist/release
          # One line per artifact (raw binaries + .deb packages), sorted
          # for stable diffs. Trust anchor for the entire release surface.
          sha256sum runlog-verifier-* runlog-verifier_*.deb | sort -k2 > SHA256SUMS
          cat SHA256SUMS

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: runlog-verifier-${{ steps.meta.outputs.version }}
          path: dist/release/*
          if-no-files-found: error

      # A release run is effectively ONE-SHOT for asset publication.
      # Re-running this workflow on a tag whose Release already carries
      # assets must NOT re-upload over them: across runs, freshly-built
      # binaries are not guaranteed bit-identical (toolchain drift —
      # mitigated by the exact Go pin above but still not promised), and
      # clobbering desyncs the published binaries from the
      # homebrew-runlog formula's pinned sha256 and the original
      # SHA256SUMS. That is exactly what broke `brew install` on
      # 2026-05-16 [T100].
      #
      # We *skip* (not fail) so a rerun can still recover the downstream
      # `update-tap` job (the documented recovery path in RELEASING.md
      # when only the tap bump failed). update-tap consumes this run's
      # rebuilt artifact, which — with the pinned toolchain and the same
      # commit — is bit-identical to the originally published assets, so
      # letting it proceed is safe and idempotent.
      # Fails CLOSED on an ambiguous gh failure: a transient API/auth/
      # network blip must not be mistaken for "no Release yet" and let a
      # rerun clobber live assets. Only an explicit "release not found"
      # (the genuine first-run state) is treated as safe-to-publish.
      - name: Check for already-published assets
        id: published
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          exists=false
          err="${RUNNER_TEMP:-/tmp}/gh_release_view.err"
          set +e
          asset_count=$(gh release view "$TAG" --repo "$REPO" \
            --json assets --jq '.assets | length' 2>"$err")
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            if [ "${asset_count:-0}" -gt 0 ]; then
              exists=true
              echo "::warning::Release $TAG already has ${asset_count} published" \
                   "asset(s); skipping Release creation to avoid clobbering them." \
                   "A release run is one-shot — to re-release, cut a new tag" \
                   "(see RELEASING.md). update-tap will still run for recovery."
            fi
          elif grep -qi 'release not found' "$err"; then
            echo "No Release for $TAG yet — first run; safe to publish."
          else
            echo "::error::Could not determine whether $TAG already has published" \
                 "assets (gh failed for a reason other than 'release not found'):"
            cat "$err"
            echo "::error::Refusing to proceed — a transient failure here could" \
                 "clobber already-published assets. Re-run once gh/API is healthy."
            exit 1
          fi
          echo "exists=${exists}" >> "$GITHUB_OUTPUT"

      # Only create a Release on a real tag push, and only if assets are
      # not already published (guard above). workflow_dispatch is a
      # smoke run — artifacts above are enough to inspect.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && steps.published.outputs.exists != 'true'
        uses: softprops/action-gh-release@v3
        with:
          draft: ${{ steps.meta.outputs.draft == 'true' }}
          fail_on_unmatched_files: true
          files: |
            dist/release/runlog-verifier-linux-amd64
            dist/release/runlog-verifier-linux-arm64
            dist/release/runlog-verifier-darwin-amd64
            dist/release/runlog-verifier-darwin-arm64
            dist/release/runlog-verifier_${{ steps.meta.outputs.version_no_v }}_amd64.deb
            dist/release/runlog-verifier_${{ steps.meta.outputs.version_no_v }}_arm64.deb
            dist/release/SHA256SUMS

  update-tap:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') && needs.build.outputs.draft != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check tap token
        id: token_check
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN secret not set — skipping tap bump."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release artifact
        if: steps.token_check.outputs.skip != 'true'
        uses: actions/download-artifact@v6
        with:
          name: runlog-verifier-${{ needs.build.outputs.version }}
          path: dist/release

      - name: Render formula and push to tap
        if: steps.token_check.outputs.skip != 'true'
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG_VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail

          # TAG_VERSION is like "v0.3.0"; the Homebrew `version` field wants "0.3.0".
          version="${TAG_VERSION#v}"

          # Parse the four SHAs from SHA256SUMS.
          read_sha() {
            grep -E "  runlog-verifier-$1\$" dist/release/SHA256SUMS | awk '{print $1}'
          }
          sha_darwin_arm64=$(read_sha darwin-arm64)
          sha_darwin_amd64=$(read_sha darwin-amd64)
          sha_linux_arm64=$(read_sha linux-arm64)
          sha_linux_amd64=$(read_sha linux-amd64)

          for v in "$sha_darwin_arm64" "$sha_darwin_amd64" "$sha_linux_arm64" "$sha_linux_amd64"; do
            if ! [[ "$v" =~ ^[0-9a-f]{64}$ ]]; then
              echo "::error::Failed to parse SHA from SHA256SUMS:"
              cat dist/release/SHA256SUMS
              exit 1
            fi
          done

          # Clone tap, render formula from template, commit if changed.
          git clone --depth 1 \
            "https://x-access-token:${TAP_TOKEN}@github.com/runlog-org/homebrew-runlog.git" tap
          cd tap

          cat > Formula/runlog-verifier.rb <<EOF
          class RunlogVerifier < Formula
            desc "Local-first verifier for Runlog cassettes"
            homepage "https://runlog.org"
            version "${version}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/runlog-org/runlog-verifier/releases/download/v#{version}/runlog-verifier-darwin-arm64"
                sha256 "${sha_darwin_arm64}"
              end
              on_intel do
                url "https://github.com/runlog-org/runlog-verifier/releases/download/v#{version}/runlog-verifier-darwin-amd64"
                sha256 "${sha_darwin_amd64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/runlog-org/runlog-verifier/releases/download/v#{version}/runlog-verifier-linux-arm64"
                sha256 "${sha_linux_arm64}"
              end
              on_intel do
                url "https://github.com/runlog-org/runlog-verifier/releases/download/v#{version}/runlog-verifier-linux-amd64"
                sha256 "${sha_linux_amd64}"
              end
            end

            def install
              bin.install Dir["runlog-verifier-*"].first => "runlog-verifier"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/runlog-verifier --version")
            end
          end
          EOF

          if git diff --quiet Formula/runlog-verifier.rb; then
            echo "Formula already at v${version} — nothing to do."
            exit 0
          fi

          git config user.name  "runlog-verifier release bot"
          git config user.email "bot@runlog.org"
          git add Formula/runlog-verifier.rb
          git commit -m "chore: bump runlog-verifier to ${version}"
          git push origin HEAD:main
