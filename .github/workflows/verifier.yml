name: verifier

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # While go.mod has a `replace github.com/runlog-org/runlog-schema
      # => ../runlog-schema` directive (added in M04-F82 to consume the
      # unreleased fixture_sidecar_process arm), CI must clone schema
      # as a sibling so `go mod tidy` can resolve it. Remove this step
      # together with the replace directive once schema v0.5.0 ships
      # and the require is bumped — see go.mod for the matching note.
      - name: Clone runlog-schema sibling for replace directive
        run: git clone --depth 1 https://github.com/runlog-org/runlog-schema.git ../runlog-schema

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      # `go mod tidy` must be a no-op in CI: any drift means a contributor
      # forgot to commit go.mod/go.sum or a stale dependency lingered.
      # Mirrors the gate in runlog-schema's `generators-smoke` job; without
      # this, Renovate major-bump PRs that add an unused require can merge
      # silently (see [B16] / [B18] re: jsonschema v6).
      - name: Tidy is clean
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "::error::go mod tidy produced changes; commit go.mod/go.sum"
            git --no-pager diff go.mod go.sum
            exit 1
          fi

      - name: Vet
        run: make vet

      - name: Test
        run: make test

      - name: Build
        run: make build

      # Validates -trimpath -buildvcs=false produce byte-identical output.
      # The Makefile reads VERSION (defaults "dev") and COMMIT (git rev-parse)
      # deterministically, so two consecutive builds in the same workspace
      # must hash identically or the trust model in
      # runlog-docs/03-verification-and-provenance.md §5.4 is broken.
      - name: Reproducibility check
        run: |
          sha1=$(sha256sum bin/runlog-verifier | awk '{print $1}')
          make clean
          make build
          sha2=$(sha256sum bin/runlog-verifier | awk '{print $1}')
          if [ "$sha1" != "$sha2" ]; then
            echo "::error::Reproducibility check FAILED — binaries differ:"
            echo "  build 1: $sha1"
            echo "  build 2: $sha2"
            exit 1
          fi
          echo "Reproducible: $sha1"
