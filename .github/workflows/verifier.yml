name: verifier

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: runlog-verifier

      - uses: actions/checkout@v4
        with:
          repository: runlog-org/runlog-schema
          path: runlog-schema

      # cache: false until go.sum is committed (CI follow-up).
      # Build is fast (stdlib + yaml.v3) so the cache miss is cheap.
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Tidy (writes go.sum on first run)
        working-directory: runlog-verifier
        run: go mod tidy

      - name: Vet
        working-directory: runlog-verifier
        run: make vet

      - name: Test
        working-directory: runlog-verifier
        run: make test

      - name: Build
        working-directory: runlog-verifier
        run: make build

      # Validates -trimpath -buildvcs=false produce byte-identical output.
      # The Makefile reads VERSION (defaults "dev") and COMMIT (git rev-parse)
      # deterministically, so two consecutive builds in the same workspace
      # must hash identically or the trust model in
      # runlog-docs/03-verification-and-provenance.md §5.4 is broken.
      - name: Reproducibility check
        working-directory: runlog-verifier
        run: |
          sha1=$(sha256sum bin/runlog-verifier | awk '{print $1}')
          make clean
          make build
          sha2=$(sha256sum bin/runlog-verifier | awk '{print $1}')
          if [ "$sha1" != "$sha2" ]; then
            echo "::error::Reproducibility check FAILED — binaries differ:"
            echo "  build 1: $sha1"
            echo "  build 2: $sha2"
            exit 1
          fi
          echo "Reproducible: $sha1"
